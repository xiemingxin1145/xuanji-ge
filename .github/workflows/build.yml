name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Report errors as issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Run: ${{ github.run_id }}"
            echo '```'
            grep -E "^e: |error:|Caused by|What went wrong|FAILURE" -A 3 build.log | head -120
            echo '```'
          } > err.md
          gh issue create --repo "${{ github.repository }}" \
            --title "Build failure #${{ github.run_id }}" \
            --body-file err.md || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xuanji-ge-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Get version name
        id: ver
        run: |
          VER=$(grep versionName app/build.gradle.kts | grep -oP '(?<=")[^"]+')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "tag=v${VER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          gh release create "$TAG" "$APK" \
            --repo "${{ github.repository }}" \
            --title "玄机阁 ${{ steps.ver.outputs.ver }} (build ${{ github.run_number }})" \
            --notes "自动构建 · commit: ${{ github.sha }}" \
            --prerelease || true
